<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outlook Local Work Agent</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: #f7f8fa;
        color: #1f2937;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .row {
        display: flex;
        gap: 6px;
        margin: 6px 0;
      }

      input {
        flex: 1;
        min-width: 0;
      }

      button {
        white-space: nowrap;
      }

      pre {
        margin: 8px 0 0;
        padding: 8px;
        border-radius: 6px;
        background: #f3f4f6;
        font-size: 12px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Outlook Local Work Agent</h1>

    <div class="card">
      <h2>인증</h2>
      <div class="row">
        <button id="start-login" type="button">로그인 시작</button>
        <button id="check-auth-status" type="button">로그인 상태 확인</button>
        <button id="logout" type="button">로그아웃</button>
      </div>
      <div class="row">
        <input id="auth-code" type="text" placeholder="인가 코드 또는 callback URL" />
        <button id="complete-login" type="button">로그인 완료</button>
      </div>
      <p id="auth-status">Auth status: unknown</p>
      <p id="login-url"></p>
      <p id="loaded-at"></p>
    </div>

    <div class="card">
      <h2>메일 동기화</h2>
      <div class="row">
        <input id="sync-folder" type="text" value="inbox" placeholder="mail_folder" />
        <input id="sync-days" type="number" value="7" min="1" max="30" />
        <button id="initial-sync" type="button">initial_sync</button>
        <button id="delta-sync" type="button">delta_sync</button>
      </div>
    </div>

    <div class="card">
      <h2>메일 조회</h2>
      <div class="row">
        <button id="list-messages" type="button">list_messages</button>
        <button id="list-threads" type="button">list_threads</button>
      </div>
      <div class="row">
        <input id="list-limit" type="number" value="50" min="1" max="200" placeholder="limit" />
      </div>
      <div class="row">
        <select id="message-select"></select>
      </div>
      <div class="row">
        <input id="message-id" type="text" placeholder="message_pk 또는 message_id" />
        <button id="get-message" type="button">get_message</button>
      </div>
      <div class="row">
        <select id="thread-select"></select>
      </div>
      <div class="row">
        <input id="thread-id" type="text" placeholder="thread_pk 또는 thread_id" />
        <input id="thread-depth" type="number" value="10" min="1" />
        <button id="get-thread" type="button">get_thread</button>
      </div>
    </div>

    <div class="card">
      <h2>첨부 다운로드</h2>
      <div class="row">
        <button id="list-attachments" type="button">list_attachments</button>
      </div>
      <div class="row">
        <select id="attachment-select"></select>
      </div>
      <div class="row">
        <input id="attachment-message-id" type="text" placeholder="graph_message_id" />
        <input id="attachment-id" type="text" placeholder="graph_attachment_id" />
      </div>
      <div class="row">
        <input id="attachment-message-pk" type="text" placeholder="message_pk" />
        <button id="download-attachment" type="button">download_attachment</button>
      </div>
    </div>

    <div class="card">
      <h2>자동 동기화</h2>
      <div class="row">
        <input id="autosync-minutes" type="number" value="10" min="1" max="120" />
        <button id="autosync-start" type="button">자동 동기화 시작</button>
        <button id="autosync-stop" type="button">자동 동기화 중지</button>
      </div>
      <p id="autosync-status">Auto sync: stopped</p>
    </div>

    <div class="card">
      <h2>운영/복구</h2>
      <div class="row">
        <button id="system-health" type="button">system.health</button>
        <button id="reset-session" type="button">reset_session</button>
        <button id="reset-session-full" type="button">reset_session+mailbox</button>
      </div>
    </div>

    <div class="card">
      <h2>Evidence/Todo</h2>
      <div class="row">
        <input id="evidence-message-pk" type="text" placeholder="message_pk" />
        <input id="evidence-snippet" type="text" placeholder="snippet" />
      </div>
      <div class="row">
        <input id="evidence-confidence" type="number" value="0.7" min="0" max="1" step="0.1" />
        <button id="create-evidence" type="button">create_evidence</button>
      </div>
      <div class="row">
        <input id="todo-id" type="text" placeholder="todo_id(optional)" />
        <input id="todo-title" type="text" placeholder="todo title" />
      </div>
      <div class="row">
        <select id="todo-status">
          <option value="open">open</option>
          <option value="in_progress">in_progress</option>
          <option value="done">done</option>
        </select>
        <input id="todo-evidence-id" type="text" placeholder="evidence_id(optional)" />
        <button id="upsert-todo" type="button">upsert_todo</button>
        <button id="workflow-list" type="button">workflow.list</button>
      </div>
    </div>

    <div class="card">
      <h2>결과</h2>
      <pre id="result">{}</pre>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
