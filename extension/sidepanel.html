<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outlook Local Work Agent</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: #f7f8fa;
        color: #1f2937;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px;
      }

      p {
        margin: 8px 0;
        line-height: 1.4;
        font-size: 14px;
      }

      code {
        background: #eef2ff;
        padding: 1px 5px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Outlook Local Work Agent</h1>
    <div class="card">
      <p>확장 프로그램 로드는 정상 완료되었습니다.</p>
      <p>Native Host 연결 후 로그인 시작/완료를 순서대로 실행하세요.</p>
      <p><button id="start-login" type="button">로그인 시작</button></p>
      <p>
        <input id="auth-code" type="text" placeholder="인가 코드(code) 입력" />
        <button id="complete-login" type="button">로그인 완료</button>
      </p>
      <p><button id="check-auth-status" type="button">로그인 상태 확인</button></p>
      <p id="login-url"></p>
      <p id="auth-status">Auth status: unknown</p>
      <p id="loaded-at"></p>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
