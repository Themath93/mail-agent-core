<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outlook Local Work Agent</title>
    <style>
      :root {
        --nm-surface-base: #edf0f2;
        --nm-surface-container: #f8f9fa;
        --nm-surface-elevated: #f1f3f5;
        --nm-text-primary: #232a31;
        --nm-text-secondary: #4a5563;
        --nm-text-muted: #6d7785;
        --nm-border-subtle: #d9dee4;
        --nm-border-default: #c7ced7;
        --nm-border-strong: #8b96a6;
        --nm-state-important: #996515;
        --nm-state-completed: #2f6f49;
        --nm-state-error: #9f3a3a;
        --nm-state-info: #3e5875;
        --nm-space-4: 4px;
        --nm-space-6: 6px;
        --nm-space-8: 8px;
        --nm-space-12: 12px;
        --nm-space-16: 16px;
        --nm-space-20: 20px;
        --nm-motion-fast: 80ms;
        --nm-motion-base: 120ms;
        --nm-ease-standard: cubic-bezier(0.2, 0, 0, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        padding: var(--nm-space-16);
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        background:
          radial-gradient(circle at 12% -8%, #f7f9fb 0, transparent 38%),
          linear-gradient(180deg, #f2f4f6 0, var(--nm-surface-base) 100%);
        color: var(--nm-text-primary);
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: var(--nm-space-8);
        overflow-x: hidden;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: 0.01em;
        color: var(--nm-text-primary);
      }

      h2 {
        margin: 0 0 var(--nm-space-8);
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        color: var(--nm-text-primary);
      }

      .card {
        background: var(--nm-surface-container);
        border: 1px solid var(--nm-border-subtle);
        border-radius: 12px;
        padding: var(--nm-space-12);
        margin: 0;
        box-shadow:
          0 1px 0 rgba(76, 91, 106, 0.06),
          0 4px 12px rgba(23, 31, 40, 0.04);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--nm-space-6);
        margin: var(--nm-space-6) 0;
        min-width: 0;
      }

      .row > * {
        min-width: 0;
      }

      input,
      select,
      button {
        height: 34px;
        border: 1px solid var(--nm-border-default);
        border-radius: 10px;
        background: var(--nm-surface-elevated);
        color: var(--nm-text-primary);
        font: inherit;
        line-height: 1.3;
      }

      input,
      select {
        flex: 1;
        min-width: 0;
        padding: 0 var(--nm-space-8);
      }

      input::placeholder {
        color: var(--nm-text-muted);
      }

      button {
        flex: 0 1 auto;
        padding: 0 var(--nm-space-8);
        white-space: nowrap;
        cursor: pointer;
        background: var(--nm-surface-container);
        transition:
          background-color var(--nm-motion-base) var(--nm-ease-standard),
          border-color var(--nm-motion-base) var(--nm-ease-standard),
          color var(--nm-motion-fast) var(--nm-ease-standard),
          opacity var(--nm-motion-fast) var(--nm-ease-standard);
      }

      button:hover {
        background: #eef1f4;
        border-color: var(--nm-border-strong);
      }

      button:active {
        background: #e7ebef;
      }

      button:disabled {
        cursor: not-allowed;
        color: var(--nm-text-muted);
        border-color: var(--nm-border-subtle);
        background: #eceff3;
        opacity: 0.85;
      }

      input:focus-visible,
      select:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--nm-border-strong);
        outline-offset: 1px;
        border-color: var(--nm-border-strong);
      }

      p {
        margin: var(--nm-space-6) 0 0;
        font-size: 12px;
        line-height: 1.5;
        color: var(--nm-text-secondary);
        overflow-wrap: anywhere;
      }

      #auth-status,
      #autosync-status,
      #autopilot-status-text {
        color: var(--nm-state-info);
      }

      pre {
        margin: var(--nm-space-8) 0 0;
        padding: var(--nm-space-8);
        border-radius: 10px;
        border: 1px solid var(--nm-border-subtle);
        background: var(--nm-surface-elevated);
        color: var(--nm-text-primary);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.45;
        overflow: auto;
        max-height: 280px;
      }

      @media (max-width: 359px) {
        body {
          padding: var(--nm-space-12);
          gap: var(--nm-space-8);
        }

        .card {
          padding: var(--nm-space-8);
          border-radius: 10px;
        }

        .row {
          gap: var(--nm-space-6);
        }

        input,
        select,
        button {
          height: 32px;
          font-size: 12px;
        }
      }

      @media (min-width: 360px) and (max-width: 399px) {
        body {
          padding: var(--nm-space-16);
        }

        .card {
          padding: var(--nm-space-12);
        }
      }

      @media (min-width: 400px) {
        body {
          padding: var(--nm-space-20);
        }

        .card {
          padding: var(--nm-space-12) 14px;
        }

        .row {
          gap: var(--nm-space-8);
        }

        input,
        select,
        button {
          height: 36px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <h1>Outlook Local Work Agent</h1>

    <div class="card">
      <h2>인증</h2>
      <div class="row">
        <button id="start-login" type="button">로그인 시작</button>
        <button id="check-auth-status" type="button">로그인 상태 확인</button>
        <button id="logout" type="button">로그아웃</button>
      </div>
      <div class="row">
        <input id="auth-code" type="text" placeholder="인가 코드 또는 callback URL" />
        <button id="complete-login" type="button">로그인 완료</button>
      </div>
      <p id="auth-status">Auth status: unknown</p>
      <p id="login-url"></p>
      <p id="loaded-at"></p>
    </div>

    <div class="card">
      <h2>메일 동기화</h2>
      <div class="row">
        <input id="sync-folder" type="text" value="inbox" placeholder="mail_folder" />
        <input id="sync-days" type="number" value="7" min="1" max="30" />
         <button id="initial-sync" type="button">초기 동기화</button>
         <button id="delta-sync" type="button">변경분 동기화</button>
      </div>
    </div>

    <div class="card">
      <h2>메일 조회</h2>
      <div class="row">
         <button id="list-messages" type="button">메일 목록 조회</button>
         <button id="list-threads" type="button">스레드 목록 조회</button>
      </div>
      <div class="row">
        <input id="list-limit" type="number" value="50" min="1" max="200" placeholder="limit" />
      </div>
      <div class="row">
        <select id="message-select"></select>
      </div>
      <div class="row">
        <input id="message-id" type="text" placeholder="message_pk 또는 message_id" />
         <button id="get-message" type="button">메일 상세 조회</button>
      </div>
      <div class="row">
        <select id="thread-select"></select>
      </div>
      <div class="row">
        <input id="thread-id" type="text" placeholder="thread_pk 또는 thread_id" />
        <input id="thread-depth" type="number" value="10" min="1" />
         <button id="get-thread" type="button">스레드 조회</button>
      </div>
    </div>

    <div class="card">
      <h2>첨부 다운로드</h2>
      <div class="row">
         <button id="list-attachments" type="button">첨부 목록 조회</button>
      </div>
      <div class="row">
        <select id="attachment-select"></select>
      </div>
      <div class="row">
        <input id="attachment-message-id" type="text" placeholder="graph_message_id" />
        <input id="attachment-id" type="text" placeholder="graph_attachment_id" />
      </div>
      <div class="row">
        <input id="attachment-message-pk" type="text" placeholder="message_pk" />
         <button id="download-attachment" type="button">첨부 다운로드</button>
      </div>
    </div>

    <div class="card">
      <h2>자동 동기화</h2>
      <div class="row">
        <input id="autosync-minutes" type="number" value="10" min="1" max="120" />
        <button id="autosync-start" type="button">자동 동기화 시작</button>
        <button id="autosync-stop" type="button">자동 동기화 중지</button>
      </div>
      <p id="autosync-status">Auto sync: stopped</p>
    </div>

    <div class="card">
      <h2>Autopilot</h2>
      <div class="row">
        <select id="autopilot-mode">
          <option value="manual">manual</option>
          <option value="review_first">review_first</option>
          <option value="full_auto">full_auto</option>
        </select>
         <button id="autopilot-set-mode" type="button">모드 설정</button>
         <button id="autopilot-status" type="button">상태 조회</button>
      </div>
      <div class="row">
        <input id="autopilot-folder" type="text" value="inbox" placeholder="mail_folder" />
        <input id="autopilot-max-messages" type="number" value="30" min="1" max="100" />
        <input id="autopilot-max-attachments" type="number" value="10" min="1" max="50" />
      </div>
      <div class="row">
         <button id="autopilot-tick" type="button">1회 실행</button>
         <button id="autopilot-pause" type="button">일시중지</button>
         <button id="autopilot-resume" type="button">재개</button>
      </div>
      <p id="autopilot-status-text">Autopilot: unknown</p>
    </div>

    <div class="card">
      <h2>운영/복구</h2>
      <div class="row">
         <button id="system-health" type="button">시스템 상태 조회</button>
         <button id="reset-session" type="button">세션 초기화</button>
         <button id="reset-session-full" type="button">세션+메일함 초기화</button>
      </div>
    </div>

    <div class="card">
      <h2>Evidence/Todo</h2>
      <div class="row">
        <input id="evidence-message-pk" type="text" placeholder="message_pk" />
        <input id="evidence-snippet" type="text" placeholder="snippet" />
      </div>
      <div class="row">
        <input id="evidence-confidence" type="number" value="0.7" min="0" max="1" step="0.1" />
         <button id="create-evidence" type="button">근거 생성</button>
      </div>
      <div class="row">
        <input id="todo-id" type="text" placeholder="todo_id(optional)" />
        <input id="todo-title" type="text" placeholder="todo title" />
      </div>
      <div class="row">
        <select id="todo-status">
          <option value="open">open</option>
          <option value="in_progress">in_progress</option>
          <option value="done">done</option>
        </select>
        <input id="todo-evidence-id" type="text" placeholder="evidence_id(optional)" />
         <button id="upsert-todo" type="button">투두 저장</button>
         <button id="workflow-list" type="button">워크플로 목록 조회</button>
      </div>
    </div>

    <div class="card">
      <h2>결과</h2>
      <pre id="result">{}</pre>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
